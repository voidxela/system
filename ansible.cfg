[defaults]
# Use the YAML callback plugin for clean, human-readable terminal output
callback_result_format = yaml
bin_ansible_callbacks = True

# Hide tasks that are skipped (cleans up the interactive diff blocks)
display_skipped_hosts = False

# Remove deprecation and python interpreter warnings
deprecation_warnings = False
interpreter_python = auto_silent

# Explicitly define the roles path so playbooks in subdirectories can find them
roles_path = roles
