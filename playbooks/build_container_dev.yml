---
# ==========================================
# PLAY 1: Scaffold the Buildah Working Container
# ==========================================
- name: Initialize Buildah Container
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Create working container from base image
      ansible.builtin.command: buildah from registry.fedoraproject.org/fedora:latest
      register: build_container
      changed_when: true

    - name: Add working container to dynamic inventory
      ansible.builtin.add_host:
        name: "{{ build_container.stdout }}"
        ansible_connection: buildah

# ==========================================
# PLAY 2: Provision the Container
# ==========================================
- name: Provision Application Layer
  hosts: "{{ hostvars['localhost']['build_container']['stdout'] }}"
  gather_facts: false
  tasks:
    - name: Execute provisioning with failure handling
      block:
        - name: Bootstrap Python for Ansible module execution
          ansible.builtin.raw: dnf install -y python3
          changed_when: true

        - name: Gather facts manually now that Python exists
          ansible.builtin.setup:

        - name: Apply core configuration
          ansible.builtin.include_role:
            name: core

        - name: Apply user configuration
          ansible.builtin.include_role:
            name: user
          vars:
            configure_sudo: true

        - name: Apply dev configuration
          ansible.builtin.include_role:
            name: dev

      rescue:
        - name: Emergency Cleanup | Destroy orphaned working container
          ansible.builtin.command: "buildah rm {{ inventory_hostname }}"
          delegate_to: localhost
          changed_when: true

        - name: Halt playbook execution
          ansible.builtin.fail:
            msg: "Build failed during provisioning. The working container has been destroyed to prevent artifact leak."

# ==========================================
# PLAY 3: Commit Image & Apply Version Matrix
# ==========================================
- name: Commit and Tag Immutable Image
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    container_id: "{{ hostvars['localhost']['build_container']['stdout'] }}"
    registry_path: "localhost/system"
  tasks:
    - name: Finalize and commit container
      block:
        - name: Configure OCI image metadata (User, Workspace, Shell)
          ansible.builtin.command: >
            buildah config
            --user {{ target_username }}
            --workingdir /home/{{ target_username }}
            --cmd /bin/zsh
            {{ container_id }}
          changed_when: true

        - name: Commit working container to tagging matrix
          ansible.builtin.command: >
            buildah commit {{ container_id }} {{ registry_path }}:{{ item }}
          loop:
            - "{{ image_version | default('0.0.0') }}-{{ image_variant | default('dev') }}-{{ git_sha | default('local') }}"
            - "v{{ (image_version | default('0.0.0')).split('.')[0] }}-{{ image_variant | default('dev') }}"
            - "{{ image_variant | default('dev') }}-latest"
          changed_when: true

      always:
        - name: Clean up working container
          ansible.builtin.command: buildah rm {{ container_id }}
          changed_when: true
          failed_when: false # Prevents a cleanup error from masking a real commit failure
