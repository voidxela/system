---
name: Container Build Pipeline

on:
  push:
    branches:
      - main
    paths:
      - VERSION
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        base: [app, dev]

    container:
      image: ghcr.io/${{ github.repository }}:dev-latest
      options: --privileged
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ${{ env.REGISTRY }} \
            -u '${{ github.actor }}' --password-stdin

      - name: Build image
        run: just build-${{ matrix.base }} -e "target_registry=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" -e "target_username=user"

      - name: Push all tags
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          for tag in $(podman images "$image" --format '{{.Tag}}'); do
            [[ "$tag" == "<none>" ]] && continue
            podman push "${image}:${tag}"
          done
