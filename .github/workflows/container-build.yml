---
name: Container Build Pipeline

on:
  push:
    branches:
      - main
      - dev
    paths:
      - VERSION
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        base: [app, dev]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install container tools
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah podman

      - name: Install ansible-core and just
        run: |
          python3 -m pip install ansible-core
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Install Ansible dependencies
        run: ansible-galaxy collection install -r requirements.yml

      - name: Authenticate with registry
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: just build-${{ matrix.base }} -e "target_registry=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" -e "target_user=user"

      - name: Push all tags
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          for tag in $(podman images "$image" --format '{{.Tag}}'); do
            [[ "$tag" == "<none>" ]] && continue
            podman push "${image}:${tag}"
          done
