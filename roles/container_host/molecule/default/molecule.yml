---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: instance-fedora
    image: registry.fedoraproject.org/fedora:latest
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /usr/sbin/init
  - name: instance-rocky
    image: docker.io/rockylinux:9
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /sbin/init
provisioner:
  name: ansible
  config_options:
    defaults:
      callback_whitelist: profile_tasks
verifier:
  name: ansible
