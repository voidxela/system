---
- name: Install Helix editor via DNF
  ansible.builtin.dnf:
    name: helix
    state: present

- name: Install mise (Workstations)
  ansible.builtin.include_tasks: "../base/tasks/install_gh_release.yml"
  vars:
    gh_app_name: "Mise"
    gh_repo: "jdx/mise"
    gh_asset_name: "mise-latest-linux-x64" # mise hosts a rolling latest binary
    gh_binary_path: "/home/{{ target_username }}/.local/bin/mise"
    gh_is_archive: false # Triggers the get_url block instead of unarchive

- name: Create Helix config subdirectory
  ansible.builtin.file:
    path: "/home/{{ target_username }}/.config/helix"
    state: directory
    owner: "{{ target_username }}"
    group: "{{ target_username }}"
    mode: "0755"

- name: Set dev dotfiles payload
  ansible.builtin.set_fact:
    managed_dotfiles:
      - {
          src: "helix_config.toml.j2",
          dest: "/home/{{ target_username }}/.config/helix/config.toml",
          mode: "0644",
        }

- name: Execute dotfile engine
  ansible.builtin.include_tasks: "../base/tasks/process_dotfiles.yml"
