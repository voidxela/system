---
# ==========================================
# ROOT FAILSAFE
# ==========================================
# Guarantees key-based access if the playbook fails midway
- name: Establish temporary root lifeline
  ansible.posix.authorized_key:
    user: root
    state: present
    key: "{{ ssh_public_key }}"

# ==========================================
# SYSTEM CONFIGURATION
# ==========================================
- name: Configure Enterprise Linux specific repositories
  ansible.builtin.dnf:
    name: epel-release
    state: present
  when: ansible_distribution in ['Rocky', 'AlmaLinux', 'CentOS', 'RedHat']

- name: Install core utilities via DNF
  ansible.builtin.dnf:
    name:
      - zsh
      - fzf
      - ripgrep
      - fd-find
      - bat
      - git
      - curl
      - dnf-automatic
    state: present

- name: Install Starship prompt (Fedora/Ultramarine native)
  ansible.builtin.dnf:
    name: starship
    state: present
  when: ansible_distribution not in ['Rocky', 'AlmaLinux', 'CentOS', 'RedHat']

- name: Install Starship prompt (Enterprise Linux static binary)
  when: ansible_distribution in ['Rocky', 'AlmaLinux', 'CentOS', 'RedHat']
  block:
    - name: Download and extract Starship release
      ansible.builtin.unarchive:
        src: "https://github.com/starship/starship/releases/latest/download/starship-x86_64-unknown-linux-gnu.tar.gz"
        dest: /usr/local/bin/
        remote_src: true
        mode: "0755"

- name: Install eza (Fedora/Ultramarine native)
  ansible.builtin.dnf:
    name: eza
    state: present
  when: ansible_distribution not in ['Rocky', 'AlmaLinux', 'CentOS', 'RedHat']

- name: Install eza (Enterprise Linux static binary)
  when: ansible_distribution in ['Rocky', 'AlmaLinux', 'CentOS', 'RedHat']
  block:
    - name: Create workspace for eza
      ansible.builtin.tempfile:
        state: directory
      register: eza_workspace

    - name: Download and extract eza release
      ansible.builtin.unarchive:
        src: "https://github.com/eza-community/eza/releases/latest/download/eza_x86_64-unknown-linux-gnu.tar.gz"
        dest: "{{ eza_workspace.path }}"
        remote_src: true

    - name: Install eza binary
      ansible.builtin.copy:
        src: "{{ eza_workspace.path }}/eza"
        dest: /usr/local/bin/eza
        owner: root
        group: root
        mode: "0755"
        remote_src: true

    - name: Clean up eza workspace
      ansible.builtin.file:
        path: "{{ eza_workspace.path }}"
        state: absent

# ==========================================
# TARGET USER PROVISIONING
# ==========================================
- name: Resolve UID 1000 collision
  block:
    - name: Get entry for UID 1000
      ansible.builtin.getent:
        database: passwd
        key: "{{ target_uid }}"
      register: squatter_check
      failed_when: false

    - name: Rename squatter user to free up UID
      ansible.builtin.user:
        name: "{{ squatter_check.ansible_facts.getent_passwd.keys() | first }}"
        non_unique: true
        uid: 9999 # Move squatter to a non-colliding high UID
        password: "!"
        password_lock: true
      when:
        - squatter_check.ansible_facts.getent_passwd is defined
        - (squatter_check.ansible_facts.getent_passwd.keys() | first) != target_username

- name: Enforce primary user group structure
  ansible.builtin.group:
    name: "{{ target_username }}"
    gid: "{{ target_gid }}"
    state: present

- name: Provision target user account
  ansible.builtin.user:
    name: "{{ target_username }}"
    uid: "{{ target_uid }}"
    group: "{{ target_gid }}"
    shell: /bin/zsh
    groups: wheel
    append: true
    state: present

- name: Configure passwordless sudo for wheel group
  ansible.builtin.copy:
    content: "%wheel ALL=(ALL) NOPASSWD: ALL"
    dest: /etc/sudoers.d/90-passwordless-wheel
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"

- name: Deploy authorized SSH public key
  ansible.posix.authorized_key:
    user: "{{ target_username }}"
    state: present
    key: "{{ ssh_public_key }}"

# ==========================================
# DOTFILE CONFIGURATION
# ==========================================
- name: Ensure base configuration directory exists
  ansible.builtin.file:
    path: "/home/{{ target_username }}/.config"
    state: directory
    owner: "{{ target_username }}"
    group: "{{ target_username }}"
    mode: "0755"

- name: Check if configuration lock file exists
  ansible.builtin.stat:
    path: "{{ config_lock_path }}"
  register: lock_stat

- name: Read existing configuration lock if present
  ansible.builtin.slurp:
    src: "{{ config_lock_path }}"
  register: raw_lock
  when: lock_stat.stat.exists
  no_log: true

- name: Initialize or parse configuration lock
  ansible.builtin.set_fact:
    config_lock: "{{ (raw_lock.content | b64decode | from_json) if lock_stat.stat.exists else {} }}"

- name: Set base dotfiles payload
  ansible.builtin.set_fact:
    managed_dotfiles:
      - {
          src: "zshrc.j2",
          dest: "/home/{{ target_username }}/.zshrc",
          mode: "0644",
        }
      - {
          src: "starship.toml.j2",
          dest: "/home/{{ target_username }}/.config/starship.toml",
          mode: "0644",
        }

- name: Execute bulk dotfile engine
  ansible.builtin.include_tasks: process_dotfiles.yml

- name: Execute network defense and firewall standardization
  ansible.builtin.include_tasks: firewall.yml

# ==========================================
# HOUSEKEEPING & LOCKDOWN
# ==========================================
- name: Apply system hardening and optimizations
  ansible.builtin.include_tasks: housekeeping.yml
