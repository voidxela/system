---
# ==========================================
# PHASE 1: THE ROOT FAILSAFE
# ==========================================
# Guarantees key-based access if the playbook fails midway
- name: Establish temporary root lifeline
  ansible.posix.authorized_key:
    user: root
    state: present
    key: "{{ ssh_public_key }}"

# ==========================================
# PHASE 2: SQUATTER EVICTION
# ==========================================
- name: Evict default users squatting on UID 1000
  block:
    - name: Get entry for UID 1000
      ansible.builtin.getent:
        database: passwd
        key: "{{ target_uid }}"
      register: squatter_check
      failed_when: false

    - name: Kill processes and remove squatter user
      block:
        - name: Terminate squatter sessions
          ansible.builtin.command: "pkill -u {{ target_uid }}"
          failed_when: false
          changed_when: true

        - name: Delete the squatter account
          ansible.builtin.user:
            name: "{{ squatter_check.ansible_facts.getent_passwd.keys() | first }}"
            state: absent
            remove: true
            force: true
      when:
        - squatter_check.ansible_facts.getent_passwd is defined
        - (squatter_check.ansible_facts.getent_passwd.keys() | first) != target_username
  ignore_unreachable: true

# ==========================================
# PHASE 3: TARGET USER PROVISIONING
# ==========================================
- name: Enforce primary user group structure
  ansible.builtin.group:
    name: "{{ target_username }}"
    gid: "{{ target_gid }}"
    state: present

- name: Provision target user account
  ansible.builtin.user:
    name: "{{ target_username }}"
    uid: "{{ target_uid }}"
    group: "{{ target_gid }}"
    shell: /bin/zsh
    groups: wheel
    append: true
    state: present

- name: Configure passwordless sudo for wheel group
  ansible.builtin.copy:
    content: "%wheel ALL=(ALL) NOPASSWD: ALL"
    dest: /etc/sudoers.d/90-passwordless-wheel
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"

- name: Deploy authorized SSH public key
  ansible.posix.authorized_key:
    user: "{{ target_username }}"
    state: present
    key: "{{ ssh_public_key }}"

# ==========================================
# PHASE 4: SYSTEM CONFIGURATION
# ==========================================
- name: Configure Enterprise Linux specific repositories
  ansible.builtin.dnf:
    name: epel-release
    state: present
  when: ansible_distribution in ['Rocky', 'AlmaLinux', 'CentOS', 'RedHat']

- name: Install core utilities via DNF
  ansible.builtin.dnf:
    name:
      - zsh
      - fzf
      - ripgrep
      - fd-find
      - bat
      - git
      - curl
    state: present

- name: Install eza (Fedora/Ultramarine native)
  ansible.builtin.dnf:
    name: eza
    state: present
  when: ansible_distribution not in ['Rocky', 'AlmaLinux', 'CentOS', 'RedHat']

- name: Install eza (Enterprise Linux static binary)
  when: ansible_distribution in ['Rocky', 'AlmaLinux', 'CentOS', 'RedHat']
  block:
    - name: Create workspace for eza
      ansible.builtin.tempfile:
        state: directory
      register: eza_workspace

    - name: Download and extract eza release
      ansible.builtin.unarchive:
        src: "https://github.com/eza-community/eza/releases/latest/download/eza_x86_64-unknown-linux-gnu.tar.gz"
        dest: "{{ eza_workspace.path }}"
        remote_src: true

    - name: Install eza binary
      ansible.builtin.copy:
        src: "{{ eza_workspace.path }}/eza"
        dest: /usr/local/bin/eza
        owner: root
        group: root
        mode: "0755"
        remote_src: true

    - name: Clean up eza workspace
      ansible.builtin.file:
        path: "{{ eza_workspace.path }}"
        state: absent

- name: Ensure base configuration directory exists
  ansible.builtin.file:
    path: "/home/{{ target_username }}/.config"
    state: directory
    owner: "{{ target_username }}"
    group: "{{ target_username }}"
    mode: "0755"

- name: Set base dotfiles payload
  ansible.builtin.set_fact:
    managed_dotfiles:
      - {
          src: "zshrc.j2",
          dest: "/home/{{ target_username }}/.zshrc",
          mode: "0644",
        }
      - {
          src: "starship.toml.j2",
          dest: "/home/{{ target_username }}/.config/starship.toml",
          mode: "0644",
        }

- name: Execute bulk dotfile engine
  ansible.builtin.include_tasks: process_dotfiles.yml

- name: Execute network defense and firewall standardization
  ansible.builtin.include_tasks: firewall.yml

# ==========================================
# PHASE 5: HOUSEKEEPING & LOCKDOWN
# ==========================================
- name: Apply system hardening and optimizations
  ansible.builtin.include_tasks: housekeeping.yml
