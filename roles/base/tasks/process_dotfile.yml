---
- name: Check current disk status for {{ file_item.dest }}
  ansible.builtin.stat:
    path: "{{ file_item.dest }}"
    checksum_algorithm: sha1
  register: disk_stat

- name: Evaluate external modifications
  ansible.builtin.set_fact:
    is_modified_externally: >-
      {{
        disk_stat.stat.exists and
        file_item.dest in ledger and
        disk_stat.stat.checksum != ledger[file_item.dest]
      }}
    proceed_with_update: true

- name: Handle configuration drift
  when: is_modified_externally | bool
  block:
    - name: Non-Interactive Mode (Safe Skip)
      when: not (interactive_dotfiles | bool)
      block:
        - name: Alert and skip
          ansible.builtin.debug:
            msg: "WARNING: {{ file_item.dest }} was modified manually. Skipping to protect changes. Run with -e 'interactive_dotfiles=true' to review."
        - name: Flag update to skip
          ansible.builtin.set_fact:
            proceed_with_update: false

    - name: Interactive Mode (Diff & Prompt)
      when: interactive_dotfiles | bool
      block:
        - name: Create temporary workspace for diffing
          ansible.builtin.tempfile:
            state: directory
          register: diff_workspace

        - name: Generate proposed template in workspace
          ansible.builtin.template:
            src: "{{ file_item.src }}"
            dest: "{{ diff_workspace.path }}/proposed_file"
            mode: "{{ file_item.mode }}"

        - name: Generate unified diff
          ansible.builtin.command: "diff -u {{ file_item.dest }} {{ diff_workspace.path }}/proposed_file"
          register: diff_output
          failed_when: diff_output.rc > 1
          changed_when: false

        - name: Display configuration drift diff
          ansible.builtin.debug:
            msg: "{{ diff_output.stdout_lines }}"

        - name: Await user authorization
          ansible.builtin.pause:
            prompt: "Conflict detected in {{ file_item.dest }}. Review the diff above. Overwrite with Ansible template? (y/n)"
          register: user_prompt

        - name: Process user authorization
          ansible.builtin.set_fact:
            proceed_with_update: "{{ user_prompt.user_input | lower == 'y' }}"

        - name: Clean up temporary workspace
          ansible.builtin.file:
            path: "{{ diff_workspace.path }}"
            state: absent

- name: Deploy managed configuration
  when: proceed_with_update | bool
  block:
    - name: Generate template file on disk
      ansible.builtin.template:
        src: "{{ file_item.src }}"
        dest: "{{ file_item.dest }}"
        owner: "{{ target_username }}"
        group: "{{ target_username }}"
        mode: "{{ file_item.mode }}"

    - name: Get updated file checksum
      ansible.builtin.stat:
        path: "{{ file_item.dest }}"
        checksum_algorithm: sha1
      register: post_stat

    - name: Update tracking ledger state
      ansible.builtin.set_fact:
        ledger: "{{ ledger | combine({file_item.dest: post_stat.stat.checksum}) }}"

    - name: Write state tracking ledger back to disk
      ansible.builtin.copy:
        content: "{{ ledger | to_nice_json }}"
        dest: "{{ hash_ledger_path }}"
        owner: "{{ target_username }}"
        group: "{{ target_username }}"
        mode: "0600"
