---
- name: Ensure firewalld and Fail2ban are installed
  ansible.builtin.dnf:
    name: [firewalld, fail2ban]
    state: present

- name: Ensure firewalld is active
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true

- name: Set strict default policy
  ansible.posix.firewalld:
    zone: drop
    state: enabled
    permanent: true
    immediate: true
    set_default_zone: true

- name: Guarantee SSH is allowed in drop zone
  ansible.posix.firewalld:
    zone: drop
    service: ssh
    permanent: true
    state: enabled
    immediate: true

- name: Configure workstation discovery services
  ansible.posix.firewalld:
    zone: drop
    service: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop: [mdns, ipp-client, samba-client]
  when: dev_node | default(false)

- name: Allow SSDP (UDP 1900) for workstations
  ansible.posix.firewalld:
    zone: drop
    port: 1900/udp
    permanent: true
    state: enabled
    immediate: true
  when: dev_node | default(false)

- name: Configure Fail2ban jail
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      banaction = firewallcmd-rich-rules
      backend = systemd

      [sshd]
      enabled = true
      port = ssh
      logpath = %(sshd_log)s
      maxretry = 5
      bantime = 1h
    mode: "0644"
  register: fail2ban_config

- name: Ensure Fail2ban is active
  ansible.builtin.systemd:
    name: fail2ban
    state: "{{ 'restarted' if fail2ban_config.changed else 'started' }}"
    enabled: true
