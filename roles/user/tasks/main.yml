---
- name: Enforce primary user group structure
  ansible.builtin.group:
    name: "{{ target_username }}"
    gid: "{{ target_gid }}"
    state: present

- name: Provision target user account
  ansible.builtin.user:
    name: "{{ target_username }}"
    uid: "{{ target_uid }}"
    group: "{{ target_gid }}"
    shell: /bin/zsh
    groups: wheel
    append: true
    state: present

- name: Configure passwordless sudo for wheel group
  ansible.builtin.copy:
    content: "%wheel ALL=(ALL) NOPASSWD: ALL"
    dest: /etc/sudoers.d/90-passwordless-wheel
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"
  when: configure_sudo | default(true) | bool

- name: Deploy authorized SSH public key
  ansible.posix.authorized_key:
    user: "{{ target_username }}"
    state: present
    key: "{{ ssh_public_key }}"

- name: Ensure base XDG user directories exist
  ansible.builtin.file:
    path: "/home/{{ target_username }}/{{ item }}"
    state: directory
    owner: "{{ target_username }}"
    group: "{{ target_username }}"
    mode: "0755"
  loop:
    - .config
    - .local/bin
    - .local/share

- name: Check if configuration lock file exists
  ansible.builtin.stat:
    path: "{{ config_lock_path }}"
  register: lock_stat

- name: Read existing configuration lock if present
  ansible.builtin.slurp:
    src: "{{ config_lock_path }}"
  register: raw_lock
  when: lock_stat.stat.exists
  no_log: true

- name: Initialize or parse configuration lock
  ansible.builtin.set_fact:
    config_lock: "{{ (raw_lock.content | b64decode | from_json) if lock_stat.stat.exists else {} }}"

- name: Set base dotfiles payload
  ansible.builtin.set_fact:
    managed_dotfiles:
      - {
          src: "zshrc.j2",
          dest: "/home/{{ target_username }}/.zshrc",
          mode: "0644",
        }
      - {
          src: "starship.toml.j2",
          dest: "/home/{{ target_username }}/.config/starship.toml",
          mode: "0644",
        }
      - {
          src: "zsh_plugins.txt.j2",
          dest: "/home/{{ target_username }}/.zsh_plugins.txt",
          mode: "0644",
        }

- name: Execute bulk dotfile engine
  ansible.builtin.include_tasks: process_dotfiles.yml
