---
- name: Check current disk status of managed dotfiles
  ansible.builtin.stat:
    path: "{{ item.dest }}"
    checksum_algorithm: sha1
  loop: "{{ managed_dotfiles }}"
  register: disk_stats
  loop_control:
    label: "{{ item.dest }}"

- name: Categorize dotfile drift states
  ansible.builtin.set_fact:
    safe_files: "{{ _safe_str | from_json }}"
    conflict_files: "{{ _conf_str | from_json }}"
  vars:
    _safe_str: >-
      {% set safe = [] %}
      {% for res in disk_stats.results %}
        {% set dest = res.item.dest %}
        {% if not (res.stat.exists and dest in config_lock and res.stat.checksum != config_lock[dest]) %}
          {% set _ = safe.append(res.item) %}
        {% endif %}
      {% endfor %}
      {{ safe | to_json }}
    _conf_str: >-
      {% set conf = [] %}
      {% for res in disk_stats.results %}
        {% set dest = res.item.dest %}
        {% if res.stat.exists and dest in config_lock and res.stat.checksum != config_lock[dest] %}
          {% set _ = conf.append(res.item) %}
        {% endif %}
      {% endfor %}
      {{ conf | to_json }}

- name: Deploy non-conflicting templates
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ target_username }}"
    group: "{{ target_username }}"
    mode: "{{ item.mode }}"
  loop: "{{ safe_files }}"
  loop_control:
    label: "{{ item.dest }}"
  register: safe_deploy_results

- name: Sync safe deployments to memory lock
  ansible.builtin.set_fact:
    config_lock: "{{ config_lock | combine({item.item.dest: item.checksum}) }}"
  loop: "{{ safe_deploy_results.results | default([]) }}"
  loop_control:
    label: "{{ item.item.dest }}"
  when: item.checksum is defined

- name: Handle detected configuration conflicts
  ansible.builtin.include_tasks: handle_dotfile_conflict.yml
  loop: "{{ conflict_files }}"
  loop_control:
    loop_var: file_item
    label: "{{ file_item.dest }}"
  when: conflict_files | length > 0

- name: Write updated configuration lock to disk
  ansible.builtin.copy:
    content: "{{ config_lock | to_nice_json }}"
    dest: "{{ config_lock_path }}"
    owner: "{{ target_username }}"
    group: "{{ target_username }}"
    mode: "0600"
